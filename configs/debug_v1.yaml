experiment:
  name: polarformer_v1_debug
  output_root: v1/outputs
  seed: 42

data:
  # Example: /data/datasets/gopro_v1/flat
  # Prepare it with: bash scripts/prepare_gopro.sh /data/datasets/gopro_v1
  root_dir: REPLACE_WITH_GOPRO_ROOT
  train_crop_size: 128
  batch_size: 1
  val_batch_size: 1
  num_workers: 0
  pin_memory: false

model:
  inp_channels: 3
  out_channels: 3
  dim: 48
  enc_blocks: [3, 4, 6]
  bottleneck_base_blocks: 3
  dec3_base_blocks: 2
  dec2_base_blocks: 2
  dec1_base_blocks: 3
  polar_window: 8
  n_theta: 16
  n_r: 8
  polar_proj_dim: 32
  router_hidden: 32
  router_topk: 2
  restormer_ffn_expansion: 2.0

loss:
  charbonnier_weight: 1.0
  use_frequency_loss: false
  frequency_weight: 0.1

optim:
  lr: 0.0002
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  epochs: 1
  grad_clip: 1.0
  ema_decay: 0.999

scheduler:
  type: cosine
  eta_min: 0.0000001

runtime:
  amp: false
  distributed: false
  resume: ""
  val_interval: 1
  save_interval: 1
  max_steps: 10

logging:
  tensorboard: true
  wandb: false
  wandb_project: polarformer-v1
  wandb_entity: ""
  wandb_mode: offline
  log_router_stats: true
  save_latest_every_epoch: true
